# =============================================================================
# CORTEX CLI — Docker Compose
# =============================================================================
# Quick start:
#   docker-compose up -d           # Start in background
#   docker-compose run cortex "hello world"
#   docker-compose down            # Stop
# =============================================================================

version: '3.8'

services:
  cortex:
    build: .
    image: cortex:latest
    container_name: cortex-cli
    stdin_open: true
    tty: true
    environment:
      # Pass through API keys from host .env
      - HF_TOKEN=${HF_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://router.huggingface.co/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-zai-org/GLM-5:together}
      - HF_MODEL_ID=${HF_MODEL_ID:-zai-org/GLM-5:together}
      - HF_MODEL_FALLBACK=${HF_MODEL_FALLBACK:-zai-org/GLM-5:novita}
      - CORTEX_USE_OPENAI=1
      - CORTEX_ALLOW_OPEN=0  # no GUI in container
      # MCP credentials
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_TEAM_ID=${SLACK_TEAM_ID}
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - POSTGRES_CONNECTION_STRING=${POSTGRES_CONNECTION_STRING}
    volumes:
      # Mount your workspace so CORTEX can read/edit your code
      - ./workspace:/workspace
      # Persist CORTEX state
      - cortex-data:/root/.cortex
    working_dir: /workspace

volumes:
  cortex-data:
